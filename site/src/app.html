<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="eslint-plugin-postgresql — lint PostgreSQL SQL files with ESLint. Catch syntax errors and enforce best practices."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script>
      // Avoid theme flash. Read preference before paint.
      try {
        const raw = localStorage.getItem("theme");
        const theme = raw === "light" || raw === "dark" || raw === "auto" ? raw : "auto";
        document.documentElement.setAttribute("data-theme", theme);
      } catch {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
