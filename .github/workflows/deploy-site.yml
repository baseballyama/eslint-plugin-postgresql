name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "src/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install
        # The repo's `pnpm-workspace.yaml` lives at the root for the
        # publishable package. The docs site is a sibling install — opt out
        # of workspace resolution so it gets its own node_modules.
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build
        env:
          NODE_ENV: production
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
