options:
  - style: never
errors:
  - messageId: unexpectedOrReplace
    message: Avoid `CREATE OR REPLACE FUNCTION`; drop and re-create the object explicitly so unintended overwrites are surfaced.
    line: 1
    column: 1
    endLine: 1
    endColumn: 7
  - messageId: unexpectedOrReplace
    message: Avoid `CREATE OR REPLACE PROCEDURE`; drop and re-create the object explicitly so unintended overwrites are surfaced.
    line: 2
    column: 1
    endLine: 2
    endColumn: 7
  - messageId: unexpectedOrReplace
    message: Avoid `CREATE OR REPLACE VIEW`; drop and re-create the object explicitly so unintended overwrites are surfaced.
    line: 3
    column: 1
    endLine: 3
    endColumn: 7
output: |-
  CREATE FUNCTION fn() RETURNS void LANGUAGE SQL AS '';
  CREATE PROCEDURE p() LANGUAGE SQL AS '';
  CREATE VIEW v AS SELECT 1;
